name: Deploy to Cloud Run

on:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write # Workload Identity Federation に必須

concurrency:
  group: deploy-cloud-run-main
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & Deploy (skip if secrets missing)
    runs-on: ubuntu-latest

    # Secrets から注入（未設定なら空）
    env:
      GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      GCP_REGION: ${{ secrets.GCP_REGION }}
      GCP_WORKLOAD_ID_PROVIDER: ${{ secrets.GCP_WORKLOAD_ID_PROVIDER }}
      GCP_SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT }}
      AR_REPOSITORY: ${{ secrets.AR_REPOSITORY }}
      CLOUD_RUN_SERVICE: ${{ secrets.CLOUD_RUN_SERVICE }}

      # DHI pull 用（dhi.io が認証必須の場合に必要）
      DHI_USERNAME: ${{ secrets.DHI_USERNAME }}
      DHI_TOKEN: ${{ secrets.DHI_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # シークレットチェック (無ければスキップ)
      - name: Check required secrets
        id: secrets_check
        shell: bash
        run: |
          missing=()

          [ -z "${GCP_PROJECT_ID}" ] && missing+=("GCP_PROJECT_ID")
          [ -z "${GCP_REGION}" ] && missing+=("GCP_REGION")
          [ -z "${GCP_WORKLOAD_ID_PROVIDER}" ] && missing+=("GCP_WORKLOAD_ID_PROVIDER")
          [ -z "${GCP_SERVICE_ACCOUNT}" ] && missing+=("GCP_SERVICE_ACCOUNT")
          [ -z "${AR_REPOSITORY}" ] && missing+=("AR_REPOSITORY")
          [ -z "${CLOUD_RUN_SERVICE}" ] && missing+=("CLOUD_RUN_SERVICE")
          [ -z "${DHI_USERNAME}" ] && missing+=("DHI_USERNAME")
          [ -z "${DHI_TOKEN}" ] && missing+=("DHI_TOKEN")

          if [ ${#missing[@]} -ne 0 ]; then
            echo "should_deploy=false" >> $GITHUB_OUTPUT
            echo "Missing secrets: ${missing[*]}"
          else
            echo "should_deploy=true" >> $GITHUB_OUTPUT
          fi

      # DHI ログイン
      - name: Docker login (dhi.io)
        if: steps.secrets_check.outputs.should_deploy == 'true' && env.DHI_USERNAME != '' && env.DHI_TOKEN != ''
        shell: bash
        run: |
          echo "${DHI_TOKEN}" | docker login dhi.io -u "${DHI_USERNAME}" --password-stdin

      # GCP ログイン (Workload Identity Federation)
      - name: Authenticate to Google Cloud (WIF)
        if: steps.secrets_check.outputs.should_deploy == 'true'
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_ID_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        if: steps.secrets_check.outputs.should_deploy == 'true'
        uses: google-github-actions/setup-gcloud@v2

      # Artifact Registry 用の Docker 認証
      - name: Configure docker for Artifact Registry
        if: steps.secrets_check.outputs.should_deploy == 'true'
        shell: bash
        run: |
          gcloud auth configure-docker "${GCP_REGION}-docker.pkg.dev" --quiet

      # Docker image ビルド
      - name: Build Docker image (prod target)
        if: steps.secrets_check.outputs.should_deploy == 'true'
        shell: bash
        run: |
          docker build \
            --platform=linux/amd64 \
            --target=prod \
            -t laravel-workflow-demo:prod \
            .

      - name: Debug prod image command
        if: steps.secrets_check.outputs.should_deploy == 'true'
        shell: bash
        run: |
          echo "=== image config ==="
          docker image inspect laravel-workflow-demo:prod --format='Entrypoint={{json .Config.Entrypoint}} Cmd={{json .Config.Cmd}} User={{json .Config.User}} WorkingDir={{json .Config.WorkingDir}}'

          echo "=== php version ==="
          docker run --rm laravel-workflow-demo:prod -v

      - name: Debug prod runtime user
        if: steps.secrets_check.outputs.should_deploy == 'true'
        shell: bash
        run: |
          echo "=== image config ==="
          docker image inspect laravel-workflow-demo:prod --format='Entrypoint={{json .Config.Entrypoint}} Cmd={{json .Config.Cmd}} User={{json .Config.User}} WorkingDir={{json .Config.WorkingDir}}'

          echo "=== php version ==="
          docker run --rm laravel-workflow-demo:prod -v

          echo "=== passwd entry for nonroot ==="
          docker run --rm laravel-workflow-demo:prod -r 'foreach (file("/etc/passwd") as $line) { if (str_starts_with($line, "nonroot:")) echo $line; }'

          echo "=== runtime uid/gid ==="
          docker run --rm laravel-workflow-demo:prod -r 'echo "uid=" . (function_exists("posix_geteuid") ? posix_geteuid() : "n/a") . PHP_EOL; echo "gid=" . (function_exists("posix_getegid") ? posix_getegid() : "n/a") . PHP_EOL;'
      
      - name: Smoke test prod container
        if: steps.secrets_check.outputs.should_deploy == 'true'
        shell: bash
        run: |
          docker create \
            --name laravel-workflow-smoke \
            -p 8080:8080 \
            -e APP_ENV=production \
            -e APP_DEBUG=false \
            -e APP_KEY=base64:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA= \
            -e LOG_CHANNEL=stderr \
            -e DB_CONNECTION=sqlite \
            -e DB_DATABASE=/app/database/database.sqlite \
            laravel-workflow-demo:prod

          docker start laravel-workflow-smoke
          sleep 5

          echo "=== docker ps -a ==="
          docker ps -a

          echo "=== docker inspect state ==="
          docker inspect laravel-workflow-smoke --format='status={{.State.Status}} exit={{.State.ExitCode}} error={{.State.Error}} started={{.State.StartedAt}} finished={{.State.FinishedAt}}' || true

          echo "=== docker logs (before curl) ==="
          docker logs laravel-workflow-smoke || true

          if ! curl -fsS http://127.0.0.1:8080 > /dev/null; then
            echo "=== docker logs (after curl failure) ==="
            docker logs laravel-workflow-smoke || true
            docker rm -f laravel-workflow-smoke || true
            exit 1
          fi

          docker rm -f laravel-workflow-smoke || true

      # Docker image プッシュ & タグ付け
      - name: Tag & Push Docker image
        if: steps.secrets_check.outputs.should_deploy == 'true'
        shell: bash
        run: |
          IMAGE="${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${AR_REPOSITORY}/laravel-workflow-demo"
          SHA_TAG="${IMAGE}:${GITHUB_SHA}"
          LATEST_TAG="${IMAGE}:latest"

          # tag 元は :prod
          docker tag laravel-workflow-demo:prod "${SHA_TAG}"
          docker tag laravel-workflow-demo:prod "${LATEST_TAG}"

          docker push "${SHA_TAG}"
          docker push "${LATEST_TAG}"

          echo "IMAGE_SHA=${SHA_TAG}" >> "$GITHUB_ENV"

      # Deploy
      - name: Deploy to Cloud Run
        if: steps.secrets_check.outputs.should_deploy == 'true'
        shell: bash
        run: |
          gcloud run deploy "${CLOUD_RUN_SERVICE}" \
            --project "${GCP_PROJECT_ID}" \
            --image "${IMAGE_SHA}" \
            --region "${GCP_REGION}" \
            --platform managed \
            --max-instances 1 \
            --set-env-vars APP_ENV=production,APP_DEBUG=false,LOG_CHANNEL=stderr,DB_CONNECTION=sqlite,DB_DATABASE=/app/database/database.sqlite \
            --set-secrets APP_KEY=APP_KEY:latest \
            --quiet
